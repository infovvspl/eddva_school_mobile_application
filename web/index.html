<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>EduLearn – Student App</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body { background: #f8fafc; display: flex; justify-content: center; align-items: flex-start; }
      #root {
        width: 390px;
        min-height: 100vh;
        background: #fff;
        box-shadow: 0 0 40px rgba(0,0,0,0.12);
        overflow: hidden;
        position: relative;
      }
      @media (max-width: 430px) { #root { width: 100%; box-shadow: none; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
